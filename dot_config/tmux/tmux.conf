# ===============================================================================
# PREFIX & CORE SETTINGS
# ===============================================================================

# Change prefix from Ctrl-b to Alt-b (easier to type)
unbind ^b
set -g prefix 'M-b'
bind-key 'M-b' send-prefix

# Fix Esc delay in vim/neovim
set -sg escape-time 10

# Enable focus events for vim autoread (from tmux-sensible)
set -g focus-events on

# Super useful when using grouped sessions and multi-monitor setups
set -g aggressive-resize on

# Terminal settings
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -g terminal-overrides 'xterm*:smcup@:rmcup@'
set -g history-limit 100000

# Allow passthrough of escape sequences to terminal (for advanced features)
# Use 'on' for visible panes only (safer than 'all')
set -g allow-passthrough on

# Enable extended keys for better keyboard support
# Allows Ctrl-function keys, disambiguates Ctrl-I from Tab, etc.
set -g extended-keys on

# ===============================================================================
# WINDOW & PANE SETTINGS
# ===============================================================================

# Use tmux's default zero-based window and pane numbering.
set -g base-index 0
setw -g pane-base-index 0

# Don't renumber windows when one is closed
set -g renumber-windows off

# Automatically set window title
set-window-option -g automatic-rename on
set-option -g set-titles on

# Pane border titles - shows active indicator and current command
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[fg=#a6e3a1 bold] ● ,#[fg=#6c7086] ○ }#[fg=default]#{pane_current_command}"

# ===============================================================================
# NOTIFICATIONS & ACTIVITY
# ===============================================================================

# Activity monitoring (visual-only, no bells or messages)
set -g visual-activity off   # Disable activity bell/message notifications (keeps only visual styling)
setw -g monitor-activity on  # Monitor activity and mark windows visually (no bells with visual-activity off)
set -g activity-action none  # Don't trigger any action on activity (visual styling only)

# Disable all bells (both audio and visual)
set -g bell-action none
set -g visual-bell off
setw -g monitor-bell off       # Don't monitor for bells (prevents terminal bell notifications)

# ===============================================================================
# KEYBINDINGS - PANE NAVIGATION
# ===============================================================================

# Vim-style pane selection (hjkl)
bind h selectp -L # Select left pane
bind j selectp -D # Select down pane
bind k selectp -U # Select up pane
bind l selectp -R # Select right pane

# ===============================================================================
# KEYBINDINGS - PANE RESIZING
# ===============================================================================

# Resize panes with Ctrl + hjkl (prefix + Ctrl-h/j/k/l)
bind ^h resizep -L 10
bind ^j resizep -D 10
bind ^k resizep -U 10
bind ^l resizep -R 10

# ===============================================================================
# KEYBINDINGS - PANE MANAGEMENT
# ===============================================================================

# Swap panes up/down
bind ^u swapp -U # Swap with upper pane (Ctrl-u)
bind ^d swapp -D # Swap with lower pane (Ctrl-d)

# Kill pane
bind q killp

# Intuitive split pane keys (| and \ for vertical, - for horizontal)
bind | split-window -h -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ===============================================================================
# KEYBINDINGS - WINDOW MANAGEMENT
# ===============================================================================

# Switch to last window
bind ^a last

# Create new window (using current path)
bind M-c new-window -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Switch windows without prefix using ALT-[ and ALT-]
bind-key -n M-[ previous-window
bind-key -n M-] next-window

# ===============================================================================
# KEYBINDINGS - CONFIG & UTILITY
# ===============================================================================

# Reload config easily
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded ~/.config/tmux/tmux.conf"

# ===============================================================================
# MOUSE & VI MODE
# ===============================================================================

# Enable mouse support
setw -g mouse on

# Vi-style keybindings for status line and copy mode
set -g status-keys vi
setw -g mode-keys vi

# ===============================================================================
# COPY MODE SETTINGS
# ===============================================================================

# Vi-style copy mode keybindings
unbind -T copy-mode-vi Space
unbind -T copy-mode-vi Enter
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel

# Enter copy mode and scroll with Ctrl-PageUp/PageDown (no prefix needed)
bind-key -n C-Pageup copy-mode \; send-key "C-b"
bind-key -n C-Pagedown copy-mode \; send-key "C-f"

# Use OSC 52 clipboard safely: tmux may set the external clipboard, but
# applications inside tmux cannot set it directly.
set -s set-clipboard external

# Prefer tmux's copy-command option over hard-coding an OS-specific clipboard tool.
if-shell 'command -v pbcopy >/dev/null 2>&1' {
  set -s copy-command 'pbcopy'
} {
  if-shell 'command -v wl-copy >/dev/null 2>&1' {
    set -s copy-command 'wl-copy'
  } {
    if-shell 'command -v xclip >/dev/null 2>&1' {
      set -s copy-command 'xclip -selection clipboard -in'
    } {
      if-shell 'command -v xsel >/dev/null 2>&1' {
        set -s copy-command 'xsel --clipboard --input'
      }
    }
  }
}

# ===============================================================================
# THEME - CATPPUCCIN MOCHA (No Plugin Dependency)
# ===============================================================================

# General UI
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"              # background: base, foreground: text
set -g message-style "bg=#313244,fg=#89dceb"             # background: surface0, foreground: sky
set -g message-command-style "bg=#313244,fg=#89dceb"     # background: surface0, foreground: sky

# Pane borders
set -g pane-border-style "fg=#313244"                    # surface0
set -g pane-active-border-style "fg=#89b4fa"             # blue
set -g pane-border-lines heavy                           # Heavy/bold border lines
set -g pane-border-indicators both                       # Show both color and arrows

# Status bar position and length
set -g status-position top
set -g status-left-length 100
set -g status-right-length 100

# Status bar modules
set -g status-left "#[fg=#1e1e2e,bg=#89b4fa,bold] #S #[default] "  # blue module with session name
set -g status-right "#[fg=#1e1e2e,bg=#a6e3a1,bold] #H #[default]"  # green module with hostname

# Window status - inactive windows (with activity indicator)
# Uses conditional formatting: yellow if activity flag is set, normal gray otherwise
set -g window-status-format "#[fg=#1e1e2e,bg=#313244]#{?window_activity_flag,#[fg=#f9e2af bold],#[fg=#cdd6f4]} #I #{?window_activity_flag,#[fg=#f9e2af bold],#[fg=#89b4fa]}#{b:pane_current_path} #[fg=#313244,bg=#1e1e2e]"

# Window status - active window
set -g window-status-current-format "#[fg=#1e1e2e,bg=#cba6f7]#[fg=#1e1e2e,bg=#cba6f7,bold] #I #[fg=#1e1e2e,bg=#cba6f7,bold]#{b:pane_current_path} #[fg=#cba6f7,bg=#1e1e2e]"  # magenta highlight

# Window with activity (visual-only indicator, no bells)
set -g window-status-activity-style "fg=#f9e2af,bold"    # yellow highlight for background activity

# Window separator
set -g window-status-separator ""

# Mode styling (copy mode, etc.)
set -g mode-style "bg=#89b4fa,fg=#1e1e2e,bold"           # blue background

# ===============================================================================
# SCROLLBARS (NEW IN TMUX 3.6)
# ===============================================================================

# Show scrollbar only when in copy/view mode (doesn't permanently narrow pane)
#set -g pane-scrollbars modal

# Position scrollbar on the right side (standard placement)
#set -g pane-scrollbars-position right

# Style: Blue slider (matches active pane border), surface0 background
# width=1 for minimal space usage, pad=0 for no gap between scrollbar and text
#set -g pane-scrollbars-style "fg=#89b4fa,bg=#313244,width=1,pad=0"

# ===============================================================================
# SIXEL IMAGE SUPPORT
# ===============================================================================

# Enable per-terminal if your emulator supports sixel graphics (requires tmux
# 3.4+ built with --enable-sixel). Match the outer terminal, not tmux-256color.
#set -as terminal-features ',xterm*:sixel'

# ===============================================================================
# PLUGINS
# ===============================================================================

# Plugin manager
set -g @plugin 'tmux-plugins/tpm'

# FZF integration for tmux (fuzzy finding sessions, windows, panes, etc.)
set -g @plugin 'sainnhe/tmux-fzf'

# ===============================================================================
# PLUGIN CONFIGURATION
# ===============================================================================

# tmux-fzf: Launch with ALT-f
TMUX_FZF_LAUNCH_KEY="M-f"

# tmux-fzf: Remove default conflicting bindings (keep only ALT-f)
unbind -T prefix F
unbind -T prefix C-f

# ===============================================================================
# INITIALIZE TPM (keep this at the very bottom)
# ===============================================================================

if-shell '[ -x ~/.config/tmux/plugins/tpm/tpm ]' 'run ~/.config/tmux/plugins/tpm/tpm'
