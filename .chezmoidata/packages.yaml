# Package definitions for different operating systems
#
# This is the SINGLE SOURCE OF TRUTH for package definitions.
# Chezmoi reads this file via .chezmoidata/packages.yaml path.
#
# This file defines which packages should be installed on each OS
# when package-manager access is available.
#
packages:
  # Arch Linux packages (via pacman)
  arch:
    official:
      # Build essentials
      - base-devel
      - git
      - wget
      - curl

      # Shell and terminal
      - zsh
      - tmux

      # Modern CLI tools
      - neovim
      - ripgrep
      - fd
      - fzf
      - bat
      - eza
      - zoxide

      # Development tools
      - nodejs
      - npm
      - pnpm
      - python
      - python-pip
      - uv

      # Utilities
      - openssh
      - unzip
      - tar
      - gzip
      - jq
      - chezmoi

    optional: []
      # Optional development tools removed (go, rust, stylua, cmake)
      # Install language-specific tooling locally when needed.

  # macOS packages (via Homebrew)
  darwin:
    brews:
      # Build essentials
      - git
      - wget
      - curl

      # Shell and terminal
      - zsh
      - tmux

      # Modern CLI tools
      - neovim
      - ripgrep
      - fd
      - fzf
      - bat
      - eza
      - zoxide

      # Development tools
      - node
      - pnpm
      - python@3.11
      - uv

      # Utilities
      - jq
      - chezmoi

    optional: []
      # Optional development tools removed (go, rust, stylua, cmake, docker, docker-compose, gh, btop, lazygit)
      # These are not required for dotfiles functionality
