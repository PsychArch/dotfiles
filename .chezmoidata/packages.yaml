# Package definitions for different operating systems
#
# This is the SINGLE SOURCE OF TRUTH for package definitions.
# Chezmoi reads this file via .chezmoidata/packages.yaml path.
#
# This file defines which packages should be installed on each OS
# when package-manager access is available.
#
packages:
  # Arch Linux packages (via pacman)
  arch:
    official:
      # Build essentials
      - base-devel
      - git
      - wget
      - curl

      # Shell and terminal
      - zsh
      - tmux

      # Modern CLI tools
      - neovim
      - ripgrep
      - fd
      - fzf
      - bat
      - eza
      - zoxide

      # Development tools
      - nodejs
      - npm
      - pnpm
      - python
      - python-pip
      - uv

      # Utilities
      - openssh
      - unzip
      - tar
      - gzip
      - jq
      - chezmoi

    optional: []
      # Optional development tools removed (go, rust, stylua, cmake)
      # Install language-specific tooling locally when needed.

  # Ubuntu/Debian packages (via apt)
  ubuntu:
    apt:
      # Build essentials
      - build-essential
      - git
      - wget
      - curl

      # Shell and terminal
      - zsh
      - tmux

      # Development tools
      - nodejs
      - npm
      - pnpm
      - python3
      - python3-pip

      # Utilities
      - openssh-client
      - unzip
      - tar
      - gzip
      - jq

      # Modern CLI tools (available in Ubuntu 24.04+ universe repository)
      - ripgrep
      - fd-find
      - bat
      - eza
      - zoxide

    # Tools best installed via cargo (if Rust is available)
    # Note: All modern CLI tools are now available via apt in Ubuntu 24.04+
    cargo: []

    # Tools requiring manual installation methods
    manual:
      - name: neovim
        method: AppImage
        command: |
          curl -LO https://github.com/neovim/neovim/releases/latest/download/nvim.appimage
          chmod u+x nvim.appimage
          sudo mv nvim.appimage /usr/local/bin/nvim

      - name: fzf
        method: git
        command: |
          git clone --depth 1 https://github.com/junegunn/fzf.git ~/.fzf
          ~/.fzf/install --all --no-update-rc

      - name: uv
        method: install script
        command: |
          curl -LsSf https://astral.sh/uv/install.sh | sh

  # macOS packages (via Homebrew)
  darwin:
    brews:
      # Build essentials
      - git
      - wget
      - curl

      # Shell and terminal
      - zsh
      - tmux

      # Modern CLI tools
      - neovim
      - ripgrep
      - fd
      - fzf
      - bat
      - eza
      - zoxide

      # Development tools
      - node
      - pnpm
      - python@3.11
      - uv

      # Utilities
      - jq
      - chezmoi

    optional: []
      # Optional development tools removed (go, rust, stylua, cmake, docker, docker-compose, gh, btop, lazygit)
      # These are not required for dotfiles functionality
